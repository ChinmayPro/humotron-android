<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Decode — section prototype v6</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
  :root{
    --ink:#fff;--ink2:#9DACA9;--ink3:#859390;--ink4:#6F7E7D;--eyebrow:#73827F;
    --lime:#C4F23E;--attention:#EE4D3D;--watch:#E7A93C;--optimal:#C4F23E;--series:#F0795E;--cool:#5FB7C4;
    --card:rgba(8,15,16,.55);--cardOpen:rgba(7,12,13,.82);--hair:rgba(255,255,255,.07);--r:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Manrope',system-ui,sans-serif;-webkit-tap-highlight-color:transparent;}
  body{background:#0b1315;display:flex;justify-content:center;padding:18px;min-height:100vh;}
  .phone{width:400px;height:860px;border-radius:32px;overflow:hidden;position:relative;display:flex;flex-direction:column;box-shadow:0 30px 90px -35px rgba(0,0,0,.75);}
  .bg{position:absolute;inset:0;z-index:0;}
  .statusbar{position:relative;z-index:3;display:flex;justify-content:space-between;padding:14px 22px 4px;color:#fff;font-size:14px;font-weight:700;}
  .statusbar .ic{font-size:11px;opacity:.85;}

  .header{position:relative;z-index:3;padding:6px 20px 0;}
  .tabs{display:flex;justify-content:space-between;align-items:center;}
  .wordmark{color:#fff;font-size:21px;font-weight:800;letter-spacing:-.02em;}
  .convbtn{color:#9DACA9;font-size:20px;cursor:pointer;}
  /* improved tab bar: underline indicator */
  .tabrow{display:flex;gap:22px;margin-top:14px;border-bottom:1px solid rgba(255,255,255,.07);}
  .tabrow .t{position:relative;color:#8a9794;font-size:13.5px;font-weight:700;cursor:pointer;white-space:nowrap;padding-bottom:11px;transition:color .2s;}
  .tabrow .t.on{color:#fff;}
  .tabrow .t.on::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;border-radius:2px;background:var(--lime);}
  .backhead{display:flex;align-items:center;gap:12px;padding-bottom:12px;}
  .backhead .b{color:#fff;font-size:22px;cursor:pointer;width:22px;}
  .backhead .ti{color:#fff;font-size:16px;font-weight:700;}
  .backhead .beta{font-size:9px;font-weight:700;background:rgba(255,255,255,.1);color:#cdd6d5;padding:2px 7px;border-radius:8px;text-transform:uppercase;letter-spacing:.05em;}
  .backhead .sp{flex:1;}
  .backhead .info{color:#9DACA9;font-size:16px;cursor:pointer;}

  .scroll{position:relative;z-index:1;flex:1;overflow-y:auto;padding-bottom:24px;}
  .scroll::-webkit-scrollbar{width:0;}

  .eyebrow{color:var(--eyebrow);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
  .hero-eyebrow{color:#8A9997;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;}
  .h1{color:#fff;font-size:26px;font-weight:800;line-height:1.16;letter-spacing:-.02em;}
  .h2{color:#fff;font-size:16px;font-weight:700;}
  .sub{color:var(--ink2);font-size:14px;line-height:1.5;font-weight:500;}
  .body{color:var(--ink3);font-size:13px;line-height:1.55;}
  .lime{color:var(--lime);} .pad{padding:16px 20px 0;}
  .card{background:var(--card);border:1px solid var(--hair);border-radius:var(--r);backdrop-filter:blur(12px);}
  .card.open{background:var(--cardOpen);border-color:rgba(196,242,62,.22);} .mb{margin-bottom:12px;}

  .devtag{display:inline-flex;align-items:center;gap:5px;font-size:9.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8a9794;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:7px;}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;color:var(--ink2);background:rgba(255,255,255,.07);padding:6px 11px;border-radius:17px;}
  .dot{width:7px;height:7px;border-radius:50%;}
  .badge{font-size:9.5px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:8px;text-transform:uppercase;}
  .b-ready{background:rgba(196,242,62,.16);color:var(--lime);} .b-none{background:rgba(255,255,255,.06);color:#8c9a9e;}
  .b-gen{background:rgba(231,169,60,.15);color:var(--watch);} .b-cool{background:rgba(95,183,196,.15);color:var(--cool);}
  .action{display:inline-flex;align-items:center;gap:7px;color:var(--lime);font-weight:700;font-size:13px;cursor:pointer;}
  .nudge{display:flex;align-items:center;gap:10px;color:var(--ink4);font-size:12px;font-weight:600;}
  .prog{flex:1;height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;}
  .prog>i{display:block;height:100%;background:var(--ink4);border-radius:3px;}
  .cta{display:inline-flex;align-items:center;gap:8px;font-size:13.5px;font-weight:700;background:var(--lime);color:#0d1618;border:none;padding:13px 20px;border-radius:22px;cursor:pointer;}
  .cta.wide{width:100%;justify-content:center;} .cta.amber{background:var(--watch);}
  .ghost{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--lime);cursor:pointer;}
  .arrow{color:#7E8E8C;}
  .grouplabel{display:flex;align-items:center;gap:12px;padding:22px 20px 12px;}
  .grouplabel .t{color:#7C8B89;font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;}
  .grouplabel .l{flex:1;height:1px;background:rgba(255,255,255,.06);}
  .statgrid{display:flex;gap:8px;} .stat{flex:1;background:rgba(255,255,255,.04);border-radius:14px;padding:12px;}
  .stat .v{color:#fff;font-size:20px;font-weight:800;} .stat .k{color:var(--ink4);font-size:10.5px;font-weight:600;margin-top:2px;}
  .scorebig{font-size:34px;font-weight:800;}
  .seg{display:flex;background:rgba(255,255,255,.05);border-radius:14px;padding:4px;}
  .seg .s{flex:1;text-align:center;font-size:11px;font-weight:600;color:#90a0a0;padding:8px 2px;border-radius:10px;cursor:pointer;}
  .seg .s.on{background:rgba(255,255,255,.1);color:#fff;}
  .banner{border-radius:13px;padding:12px 14px;font-size:12.5px;line-height:1.5;}
  .banner.good{background:rgba(196,242,62,.1);color:#bcd98a;border:1px solid rgba(196,242,62,.18);}
  .rail{display:flex;gap:12px;overflow-x:auto;padding:2px 20px 16px;scrollbar-width:none;}
  .rail::-webkit-scrollbar{display:none;}
  .repcard{width:250px;flex-shrink:0;background:#0b1315;border:1px solid var(--hair);border-radius:20px;padding:18px;display:flex;flex-direction:column;min-height:184px;cursor:pointer;}
  .repcard .repscore{font-size:40px;font-weight:800;line-height:1;letter-spacing:-1.5px;}
  .repcard .repname{font-weight:700;font-size:15px;color:#fff;margin-top:8px;}
  .repzone{align-self:flex-start;margin-top:12px;padding:6px 13px;border-radius:10px;font-weight:800;font-size:12.5px;color:#0d1618;}
  .repfoot{margin-top:auto;padding-top:16px;display:flex;justify-content:space-between;align-items:center;}
  .repdate{color:var(--ink3);font-size:12.5px;}
  .repcard.gen{background:rgba(8,15,16,.55);cursor:default;}
  .repcard.gen.ready{border-color:rgba(196,242,62,.30);}
  .genicon{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:17px;color:#9aa8a5;}
  .genicon.lime{background:rgba(196,242,62,.12);color:var(--lime);}
  .cta.disabled{opacity:.55;background:rgba(255,255,255,.08);color:#9aa8a5;pointer-events:none;}
  .prog{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
  .prog i{display:block;height:100%;border-radius:3px;}
  .prevtog{display:flex;align-items:center;gap:6px;margin:2px 20px 6px;padding:5px;background:rgba(255,255,255,.04);border-radius:11px;width:fit-content;}
  .prevtog .pl{font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6F7E7D;padding:0 4px 0 6px;}
  .prevtog .ps{font-size:10.5px;font-weight:600;color:#90a0a0;padding:5px 10px;border-radius:7px;cursor:pointer;}
  .prevtog .ps.on{background:rgba(255,255,255,.1);color:#fff;}
  .chartwrap{background:rgba(255,255,255,.03);border-radius:14px;padding:14px;}
  .hbar{display:flex;align-items:center;gap:10px;margin:9px 0;}
  .hbar .lab{width:96px;color:var(--ink3);font-size:11px;flex-shrink:0;}
  .hbar .track{flex:1;height:16px;background:rgba(255,255,255,.05);border-radius:6px;overflow:hidden;}
  .hbar .fill{height:100%;border-radius:6px;background:var(--series);}
  .hbar .val{color:#fff;font-size:11px;font-weight:700;width:30px;text-align:right;}
  .zone{display:flex;align-items:center;gap:10px;margin:7px 0;}
  .zone .zl{width:74px;color:var(--ink2);font-size:11px;font-weight:600;}
  .zone .zt{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:5px;overflow:hidden;}
  .zone .zf{height:100%;border-radius:5px;} .zone .zp{color:var(--ink3);font-size:10px;width:40px;text-align:right;}
  /* calendar heatmap */
  .cal{background:rgba(255,255,255,.03);border-radius:14px;padding:14px;}
  .calhead,.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .calhead span{text-align:center;color:var(--ink4);font-size:9px;font-weight:700;}
  .calgrid{margin-top:6px;}
  .cell{aspect-ratio:1;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.85);}
  .cell.empty{background:transparent;}
  .calleg{display:flex;justify-content:space-between;margin-top:12px;font-size:9px;color:var(--ink4);}
  .calleg .sw{display:inline-block;width:10px;height:10px;border-radius:3px;margin-right:4px;vertical-align:-1px;}
  .ins-card{border-left:3px solid var(--lime);background:rgba(255,255,255,.03);border-radius:0 14px 14px 0;padding:12px 14px;margin:8px 0;}
  .ins-card .d{color:var(--ink4);font-size:10px;font-weight:600;margin-bottom:4px;}
  .ins-card .t{color:#fff;font-size:13.5px;font-weight:700;} .ins-card .x{color:var(--ink3);font-size:12px;margin-top:4px;line-height:1.5;}
  .ap{display:flex;gap:10px;background:rgba(255,255,255,.03);border-radius:13px;padding:12px;margin:8px 0;}
  .ap .k{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
  .ap .t{color:#fff;font-size:13px;font-weight:700;} .ap .x{color:var(--ink3);font-size:11.5px;margin-top:3px;line-height:1.45;}
  .lvlrow{display:flex;justify-content:space-between;padding:9px 12px;border-radius:9px;font-size:12px;}
  .lvlrow .k{color:var(--ink2);font-weight:600;} .lvlrow .v{color:var(--ink3);}
  .lvlrow.on{background:rgba(231,169,60,.16);} .lvlrow.on .k,.lvlrow.on .v{color:var(--watch);}
  .qrow{background:var(--card);border:1px solid var(--hair);border-radius:14px;padding:14px;margin-bottom:9px;color:#dfe6e5;font-size:13.5px;font-weight:600;line-height:1.4;cursor:pointer;}
  .conv{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);}
  .conv .t{color:#fff;font-size:14px;font-weight:700;} .conv .d{color:var(--ink4);font-size:11px;margin-top:2px;} .conv .del{color:#EE4D3D;cursor:pointer;}
  /* metrics list */
  .mrow{display:flex;align-items:center;gap:12px;padding:14px;}
  .mrow .nm{color:#fff;font-size:14px;font-weight:700;} .mrow .rd{color:var(--ink3);font-size:12px;margin-top:2px;}
  .mrow .st{font-size:9.5px;font-weight:700;padding:4px 9px;border-radius:9px;}
  .st.avail{background:rgba(196,242,62,.15);color:var(--lime);} .st.un{background:rgba(255,255,255,.06);color:#7d8a89;}
  .mrow.dim{opacity:.55;}
  /* chat thread */
  .qbubble{margin:6px 20px 0 56px;background:rgba(0,0,0,.45);border-radius:18px 18px 4px 18px;padding:14px 16px;color:#fff;font-size:14px;font-weight:600;}
  .qbubble .ts{color:#8a9794;font-size:10.5px;font-weight:500;margin-top:8px;}
  .answer{padding:22px 20px 0;color:#eef3f2;font-size:14.5px;line-height:1.62;}
  .answer b{color:#fff;} .answer .fu{margin-top:18px;color:#cdd6d5;font-size:14px;line-height:1.9;}
  .answer .fu span{cursor:pointer;border-bottom:1px solid rgba(196,242,62,.4);}
  /* retailer wow */
  .matchhero{padding:22px 20px 0;text-align:center;}
  .ring{position:relative;width:120px;height:120px;margin:8px auto 0;}
  .ring svg{transform:rotate(-90deg);} .ring .mid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .ring .mid .v{color:#fff;font-size:26px;font-weight:800;} .ring .mid .k{color:var(--ink3);font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}
  .privacy{margin:16px 20px 0;background:rgba(196,242,62,.08);border:1px solid rgba(196,242,62,.18);border-radius:14px;padding:14px;display:flex;gap:10px;}
  .privacy .em{color:var(--lime);font-size:16px;} .privacy .x{color:#bcd98a;font-size:12px;line-height:1.5;}
  .retail{display:flex;align-items:center;gap:12px;padding:14px;}
  .retail .logo{width:42px;height:42px;border-radius:11px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;font-size:16px;}
  .retail .nm{color:#fff;font-size:14px;font-weight:700;} .retail .meta{color:var(--ink4);font-size:11px;margin-top:2px;}
  .retail .price{color:#fff;font-size:15px;font-weight:800;} .retail .buy{font-size:11px;font-weight:700;color:var(--lime);}
  /* report status */
  .rstatus{margin:0 20px;background:var(--card);border:1px solid var(--hair);border-radius:16px;padding:14px;}
  .rstatus .top{display:flex;justify-content:space-between;align-items:center;}
  .rstatus .pipe{margin-top:12px;}
  .bottombar{position:relative;z-index:3;display:flex;justify-content:space-around;align-items:center;padding:10px 8px 14px;background:rgba(4,8,9,.82);border-top:1px solid rgba(255,255,255,.06);backdrop-filter:blur(10px);transition:transform .3s ease,opacity .25s;}
  .bb{display:flex;flex-direction:column;align-items:center;gap:4px;color:#6C7A7F;font-size:10.5px;font-weight:600;} .bb.on{color:var(--lime);} .bb .g{font-size:16px;}
  /* chat input + collapse */
  .chatinput{position:absolute;left:14px;right:14px;bottom:86px;z-index:4;display:none;align-items:center;gap:10px;transition:bottom .3s ease,left .3s ease;}
  .phone.chatmode .chatinput{display:flex;}
  .chatinput .collapse{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:#9DACA9;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;}
  .chatinput .box{flex:1;height:46px;border-radius:24px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);color:#fff;padding:0 16px;font-size:14px;outline:none;}
  .navpill{position:absolute;right:14px;bottom:18px;z-index:5;display:none;align-items:center;gap:8px;background:rgba(4,8,9,.9);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:6px 8px 6px 12px;cursor:pointer;}
  .navpill .ch{color:#9DACA9;font-size:14px;} .navpill .av{width:30px;height:30px;border-radius:50%;background:#2a3b3a;display:flex;align-items:center;justify-content:center;font-size:14px;}
  .phone.typing .bottombar{transform:translateY(130%);opacity:0;}
  .phone.typing .chatinput{bottom:18px;}
  .phone.typing.chatmode .navpill{display:flex;}
  .disc{text-align:center;color:var(--ink4);font-size:11px;padding:14px 20px 96px;}
  .chev{transition:transform .25s;} .open .chev{transform:rotate(180deg);}
  @keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .scroll .card{animation:cardIn .42s cubic-bezier(.22,.61,.36,1) backwards;transition:transform .12s ease;}
  .scroll.noanim .card{animation:none;}
  .scroll .card:active{transform:scale(.985);}
  .scroll .qrow{animation:cardIn .42s cubic-bezier(.22,.61,.36,1) backwards;}
  .scroll.noanim .qrow{animation:none;}
  .title1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .teaser1{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  svg{display:block;}
  /* workday — day scroller */
  .dayscroll{display:flex;gap:8px;overflow-x:auto;padding:14px 20px 2px;scrollbar-width:none;scroll-snap-type:x proximity;}
  .dayscroll::-webkit-scrollbar{display:none;}
  .daychip{flex:0 0 auto;width:46px;text-align:center;padding:9px 0 8px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid transparent;cursor:pointer;scroll-snap-align:center;transition:background .15s ease,border-color .15s ease;}
  .daychip.on{background:rgba(196,242,62,.12);border-color:rgba(196,242,62,.38);}
  .daychip.nodata{opacity:.38;cursor:default;}
  .daychip .dw{font-size:9px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--ink4);}
  .daychip .dn{font-size:16px;font-weight:800;color:#fff;margin-top:3px;line-height:1;}
  .daychip .dd{width:7px;height:7px;border-radius:50%;margin:7px auto 0;}
  /* workday — day score */
  .dayscore{display:flex;align-items:flex-end;gap:16px;}
  .dayscore .num{font-size:54px;font-weight:800;line-height:.86;letter-spacing:-2px;}
  .dayzonechip{display:inline-block;font-size:11px;font-weight:700;color:#0d1618;padding:3px 11px;border-radius:11px;}
  /* workday — hour heat strip */
  .hourstrip{display:flex;align-items:flex-end;gap:4px;padding-top:4px;}
  .hourcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
  .hourcol .bar{width:100%;max-width:22px;border-radius:5px 5px 3px 3px;}
  .hourcol .hl{font-size:8.5px;font-weight:600;color:var(--ink4);}
  /* vertical bar chart */
  .vbars{display:flex;align-items:flex-end;justify-content:space-around;gap:28px;height:150px;padding:18px 14px 0;}
  .vcol{flex:1;max-width:78px;display:flex;flex-direction:column;align-items:center;gap:9px;}
  .vbar{width:100%;background:var(--series);border-radius:8px 8px 0 0;position:relative;min-height:6px;}
  .vbar .vv{position:absolute;top:-19px;left:0;right:0;text-align:center;font-size:13px;font-weight:800;color:#fff;}
  .vcol .vl{font-size:11px;font-weight:600;color:var(--ink3);}
  /* multi-day line — axis + legend */
  .dlx{display:flex;justify-content:space-between;margin-top:6px;padding:0 4px;font-size:10px;font-weight:600;color:var(--ink4);}
  .dlleg{display:flex;flex-wrap:wrap;justify-content:center;gap:13px;margin-top:11px;font-size:10px;color:var(--ink3);}
  .dlleg>span{display:inline-flex;align-items:center;gap:5px;}
  .dlleg>span>span{width:10px;height:10px;border-radius:3px;flex-shrink:0;}
  /* comparison cards */
  .cmpgrid{display:flex;gap:10px;margin-top:12px;}
  .cmpcard{flex:1;background:rgba(255,255,255,.04);border-radius:16px;padding:16px;}
  .cmpd{font-size:22px;font-weight:800;color:#fff;letter-spacing:-.5px;line-height:1;}
  .cmpm{font-size:11px;color:var(--ink3);margin-top:7px;}
  .cmpt{font-size:12px;font-weight:700;margin-top:12px;}
  /* month report cards */
  .monthcard{padding:18px;}
  .mh{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  /* weather report card foot */
  .wfoot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--hair);}
  .collectchip{display:inline-flex;align-items:center;gap:8px;font-size:10.5px;font-weight:600;color:var(--ink3);}
  .collectchip .cp{display:inline-block;width:46px;height:5px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
  .collectchip .cp i{display:block;height:100%;background:var(--watch);border-radius:3px;}
  .gennext{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--lime);cursor:pointer;}
</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="bg" id="bg"></div>
  <div class="statusbar"><span>12:55</span><span class="ic">▮▮▮ ⌃ ▭</span></div>
  <div id="head" class="header"></div>

S.workday_report=()=>{
  const dayBody=()=>{
    const idx=(wdDay==null?WD_DAYS.length-1:wdDay),day=WD_DAYS[idx],z=day.zone;
    const chips=WD_DAYS.map((d,i)=>`<div class="daychip ${i===idx?'on':''} ${d.hasData?'':'nodata'}" ${d.hasData?`data-wdday="${i}"`:''}><div class="dw">${DOW[d.dow]}</div><div class="dn">${d.date.getDate()}</div><div class="dd" style="background:${d.hasData?d.zone.color:'rgba(255,255,255,.15)'}"></div></div>`).join('');
    const dist=zoneDist(day);
    const strip=`<div class="hourstrip">${day.hours.map(h=>{const zz=zoneOf(h.v),hr=h.h>12?h.h-12:h.h,suf=(h.h===9||h.h===12||h.h===17)?(h.h>=12?'p':'a'):'';return `<div class="hourcol"><div class="bar" style="height:${Math.max(8,Math.round(h.v/85*78))}px;background:${zz.color}"></div><div class="hl">${hr}${suf}</div></div>`;}).join('')}</div>`;
    const fmt=day.date.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'short'});
    return `
    <div class="dayscroll">${chips}</div>
    <div class="pad" style="padding-top:14px"><div class="body" style="font-size:12px">${E(fmt)} · Workday 9am – 5pm</div>
      <div class="card" style="padding:18px;margin-top:10px">
        <div class="dayscore"><div class="num" style="color:${z.color}">${day.score}</div><div style="padding-bottom:5px"><span class="dayzonechip" style="background:${z.color}">${z.name}</span><div class="body" style="font-size:11px;margin-top:8px">Workday stress score</div></div></div></div></div>
    <div class="pad"><div class="h2" style="margin-bottom:10px">Time spent in each zone</div>
      ${dist.map(d=>`<div class="zone"><span class="zl">${d.name}</span><div class="zt"><div class="zf" style="width:${d.pct}%;background:${d.color}"></div></div><span class="zp">${d.pct}%</span></div>`).join('')}</div>
    <div class="pad"><div class="h2" style="margin-bottom:4px">Stress across your workday</div>
      <p class="body" style="margin-bottom:12px">Each hour is shaded by how your body tracked through the working day.</p>
      <div class="chartwrap">${strip}</div>
      <div class="calleg" style="margin-top:12px">${ZONES.map(zz=>`<span><span class="sw" style="background:${zz.color}"></span>${zz.name}</span>`).join('')}</div></div>`;
  };
  const monthBody=()=>`
    <div class="pad" style="padding-top:14px"><div class="h2" style="margin-bottom:10px">Stress across the month</div>${calendar()}
      <p class="body" style="margin-top:10px">Each day is shaded by its workday stress score — your weekends are running hotter than weekdays this month.</p></div>
    <div class="grouplabel"><span class="t">Monthly reports</span><span class="l"></span></div>
    <div class="pad" style="padding-top:0;display:flex;flex-direction:column;gap:12px">
    ${WD_MONTHS.map(m=>{
      if(m.state==='ready')return `<div class="card monthcard" data-push="${m.target}"><div class="mh"><div><div class="h2">${m.month}</div><div class="body" style="margin-top:3px">${E(m.range)}</div></div><div style="text-align:right"><div class="scorebig" style="font-size:23px;color:${ZONE[m.zone]}">${m.score}</div><div class="body" style="font-size:10px">avg · ${m.zone}</div></div></div><div class="wfoot"><span class="badge b-ready">Report ready</span><span class="ghost">View report →</span></div></div>`;
      if(m.state==='generate')return `<div class="card monthcard"><div class="mh"><div><div class="h2">${m.month}</div><div class="body" style="margin-top:3px">${E(m.range)}</div></div><span class="badge b-ready">Data ready</span></div><div class="body" style="margin-top:10px">${E(m.note)}</div><button class="cta wide" style="margin-top:14px" data-process="workday_details" data-process-id="${m.pid}">Generate report →</button></div>`;
      return `<div class="card monthcard"><div class="mh"><div><div class="h2">${m.month}</div><div class="body" style="margin-top:3px">${E(m.range)}</div></div><span class="badge b-gen">Collecting</span></div><div class="prog" style="margin-top:14px"><i style="width:${m.pct}%;background:var(--watch)"></i></div><div class="body" style="margin-top:8px">${E(m.note)}</div><button class="cta wide disabled" style="margin-top:14px">Collecting…</button></div>`;
    }).join('')}</div>`;
  return {title:'Workday Stress',info:true,body:`
    <div class="pad"><div class="seg"><span class="s ${wdView==='day'?'on':''}" data-wdview="day">By day</span><span class="s ${wdView==='month'?'on':''}" data-wdview="month">By month</span></div></div>
    ${wdView==='day'?dayBody():monthBody()}`};
};

function render(){
  const head=document.getElementById('head'),scr=document.getElementById('screen'),phone=document.getElementById('phone');
  let cur;
  if(state.stack.length){const top=state.stack[state.stack.length-1];cur=S[top.screen](top.params);}
  else cur=S[TAB_ROOT[state.tab]]({});
  if(state.stack.length){
    const sc=state.stack[state.stack.length-1].screen;
    head.innerHTML=`<div class="backhead"><span class="b" data-back>‹</span><span class="ti">${E(cur.title)}</span>${cur.beta?'<span class="beta">beta</span>':''}<span class="sp"></span>${cur.info?'<span class="info">ⓘ</span>':''}${cur.conv?'<span class="convbtn" data-push="conversations:x">≡</span>':''}</div>`;
  }else{
    const tabs=[['insights','Insights'],['deepdives','Deep Dives'],['optimize','Optimize'],['chat','Chat']];
    head.innerHTML=`<div class="tabs"><span class="wordmark">Decode</span>${cur.conv?'<span class="convbtn" data-push="conversations:x">≡</span>':''}</div><div class="tabrow">${tabs.map(t=>`<span class="t ${state.tab===t[0]?'on':''}" data-tab="${t[0]}">${t[1]}</span>`).join('')}</div>`;
  }
  scr.innerHTML=cur.body;scr.scrollTop=0;
  const ac=scr.querySelector('.daychip.on');if(ac&&ac.parentElement){ac.parentElement.scrollLeft=ac.offsetLeft-ac.parentElement.clientWidth/2+ac.offsetWidth/2;}
  if(playAnim){scr.classList.remove('noanim');let i=0;scr.querySelectorAll('.card,.qrow').forEach(el=>{el.style.animationDelay=(i*0.045)+'s';i++;});}else{scr.classList.add('noanim');}
  phone.classList.toggle('chatmode',!!cur.chat);
  if(!cur.chat)phone.classList.remove('typing');
  if(cur.processing){setTimeout(()=>{if(state.stack.length&&state.stack[state.stack.length-1].screen==='processing'){state.stack.pop();push(cur.next,cur.nextParams);}},2600);cyclePStatus();}
  paint();
}
let pTimer;function cyclePStatus(){const steps=['Reading your signals','Finding patterns','Connecting the dots','Composing your insight'];let i=0;clearInterval(pTimer);pTimer=setInterval(()=>{const el=document.getElementById('pstatus');if(!el){clearInterval(pTimer);return;}i=(i+1)%steps.length;el.textContent=steps[i];},650);}

document.addEventListener('click',e=>{
  const tab=e.target.closest('[data-tab]');if(tab){setTab(tab.dataset.tab);return;}
  const b=e.target.closest('[data-back]');if(b){back();return;}
  const pr=e.target.closest('[data-process]');if(pr){processTo(pr.dataset.process,{id:pr.dataset.processId||''});return;}
  const wv=e.target.closest('[data-wdview]');if(wv){playAnim=false;wdView=wv.dataset.wdview;render();return;}
  const wd=e.target.closest('[data-wdday]');if(wd){playAnim=false;wdDay=parseInt(wd.dataset.wdday);render();return;}
  const rs=e.target.closest('[data-rstate]');if(rs){playAnim=false;repState=parseInt(rs.dataset.rstate);render();return;}
  const ws=e.target.closest('[data-wstate]');if(ws){playAnim=false;weatherPreview=ws.dataset.wstate;render();return;}
  const ex=e.target.closest('[data-exp]');if(ex){playAnim=false;const id=ex.dataset.exp;expanded.has(id)?expanded.delete(id):expanded.add(id);render();return;}
  const p=e.target.closest('[data-push]');if(p&&p.dataset.push){const[s,par]=p.dataset.push.split(':');push(s,{id:par});return;}
});
// chat input collapse
const phone=document.getElementById('phone');
document.getElementById('cbox').addEventListener('focus',()=>phone.classList.add('typing'));
document.getElementById('collapse').addEventListener('click',()=>{phone.classList.remove('typing');document.getElementById('cbox').blur();});
document.getElementById('navpill').addEventListener('click',()=>{phone.classList.remove('typing');document.getElementById('cbox').blur();});

/* gradient */
const topPole=[[0x13,0x23,0x2A],[0x16,0x3A,0x3E],[0x1C,0x4E,0x52]],botPole=[[0x0F,0x1E,0x24],[0x15,0x49,0x51],[0x20,0x5C,0x60]];
const bg=document.getElementById('bg'),scr2=document.getElementById('screen');
const lp=(a,b,t)=>Math.round(a+(b-a)*t),mix=(i,t)=>`rgb(${lp(topPole[i][0],botPole[i][0],t)},${lp(topPole[i][1],botPole[i][1],t)},${lp(topPole[i][2],botPole[i][2],t)})`;
function paint(){const max=Math.max(1,scr2.scrollHeight-scr2.clientHeight);const p=Math.max(0,Math.min(1,scr2.scrollTop/max));const mid=(0.55-0.12*p)*100;bg.style.background=`linear-gradient(${160+10*p}deg, ${mix(0,p)} 0%, ${mix(1,p)} ${mid}%, ${mix(2,p)} 100%)`;}
scr2.addEventListener('scroll',paint,{passive:true});
render();
</script>
